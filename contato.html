       <h1>Entre em contato</h1>
    
       <div class="containerForm">
        <form action="">
        
        
            <label for="Nome">Nome:</label>
                <input 
                    type="text"
                    id="nome" 
                    name="nome" required placeholder="digitar seu nome"/> 
        
            <label for="telefone">Telefone:</label>
                <input 
                    type="number"
                    id="telefone" 
                    name="telefone" required placeholder="insia seu numero"/>
        
        
      
            <label for="msg">Mensagem:</label>
                <textarea 
                    name="msg" 
                    id="msg" 
                    cols="50" 
                    rows="5" placeholder="Deixe seu comentario">
                </textarea>
    
        
        <button type="submit">Enviar</button>
        </form>
        </div>
        </div>
