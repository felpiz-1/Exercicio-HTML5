       <h1>Entre em contato</h1>
    
       <div class="containerForm">
        <div class="form">
        <form action="">
        
        <p>
            <label for="Nome">nome:</label>
                <input 
                    type="text"
                    id="nome" 
                    name="nome" required placeholder="digitar seu nome"/> 
        </p>
        <p>
            <label for="telefone">Telefone:</label>
                <input 
                    type="number"
                    id="telefone" 
                    name="telefone" required placeholder="insia seu numero"/>
        </p>
        <p>
      
            <label for="msg">Mensagem</label>
                <textarea 
                    name="msg" 
                    id="msg" 
                    cols="50" 
                    rows="5" placeholder="Deixe seu comentario">
                </textarea>
        </p>
        
        <button type="submit">Enviar</button>
        </form>
